<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <!-- טעינת Vue ישירות מהאינטרנט -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
        }
        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover { background: #2980b9; }
        .refresh-btn {
            background: #2ecc71;
            width: auto;
            margin-bottom: 15px;
        }
        .refresh-btn:hover { background: #27ae60; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f4f6f7;
            color: #2c3e50;
        }
        tr:hover { background-color: #fcfcfc; }
    </style>
</head>
<body>

<div id="app">
    <div class="container">
        <h1>🎓 Student Course Portal</h1>

        <!-- אזור הוספת הסטודנט -->
        <div class="form-section">
            <h3>Add New Student Record</h3>
            <div class="input-group">
                <input v-model="form.studentId" type="text" placeholder="Student ID (e.g. 123456789)" />
                <input v-model="form.name" type="text" placeholder="Full Name" />
            </div>
            <div class="input-group">
                <input v-model="form.courseName" type="text" placeholder="Course Name (e.g. Java 101)" />
                <input v-model="form.grade" type="number" placeholder="Grade (0-100)" />
            </div>
            <button @click="addRecord">Save Record to Database</button>
        </div>

        <!-- אזור תצוגת הנתונים -->
        <div class="data-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Database Records</h3>
                <button class="refresh-btn" @click="fetchRecords">🔄 Refresh Data</button>
            </div>

            <table>
                <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Grade</th>
                </tr>
                </thead>
                <tbody>
                <!-- לולאה שעוברת על כל הנתונים שחזרו מהשרת -->
                <tr v-for="(record, index) in recordsList" :key="index">
                    <td>{{ record.studentId }}</td>
                    <td>{{ record.name }}</td>
                    <td>{{ record.courseName }}</td>
                    <td><strong>{{ record.grade }}</strong></td>
                </tr>
                <tr v-if="recordsList.length === 0">
                    <td colspan="4" style="text-align: center; color: #888;">No records found. Add one above!</td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            // הכתובת של שרת ה-Spring Boot של הסטודנטים
            const API_BASE = 'http://localhost:8080/api/students';

            // משתנים ריאקטיביים
            const recordsList = ref([]);
            const form = ref({
                studentId: '',
                name: '',
                courseName: '',
                grade: null
            });

            // פונקציית עזר לפניות לשרת
            const apiCall = async (endpoint, method = 'GET', body = null) => {
                try {
                    const options = { method, headers: { 'Content-Type': 'application/json' } };
                    if (body) options.body = JSON.stringify(body);

                    const response = await fetch(`${API_BASE}${endpoint}`, options);
                    if (!response.ok) throw new Error(`Server error: ${response.status}`);

                    const text = await response.text();
                    return text ? JSON.parse(text) : {};
                } catch (error) {
                    alert(`Connection Error: Make sure your Spring Boot server is running on port 8080 and @CrossOrigin is added to your Controller!`);
                    console.error(error);
                    return null;
                }
            };

            // משיכת כל הנתונים מהשרת
            const fetchRecords = async () => {
                const data = await apiCall('');
                if (data) {
                    recordsList.value = data;
                }
            };

            // שליחת נתונים חדשים לשרת
            const addRecord = async () => {
                if (!form.value.studentId || !form.value.name || !form.value.courseName) {
                    alert("Please fill in all fields!");
                    return;
                }

                await apiCall('', 'POST', form.value);
                alert("Record successfully saved!");

                // ניקוי הטופס אחרי השמירה
                form.value = { studentId: '', name: '', courseName: '', grade: null };

                // רענון אוטומטי של הטבלה
                fetchRecords();
            };

            // טעינת הנתונים אוטומטית כשהעמוד עולה
            onMounted(() => {
                fetchRecords();
            });

            return {
                form,
                recordsList,
                addRecord,
                fetchRecords
            };
        }
    }).mount('#app');
</script>

</body>
</html>
